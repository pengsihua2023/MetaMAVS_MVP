# MetaMAVS — UGA GACRC Sapelo2, GOTTCHA2-only smoke test (Phase 3 real cluster).
# Controller on your laptop submits a single GOTTCHA2 SLURM job to Sapelo2 over
# SSH (ControlMaster reuses one Duo auth), downloads the .tsv, parses locally.
#
# >>> FILL the two TODO paths before --execute. <<<
project:
  name: MetaMAVS
  run_name: sapelo2_genome72
  output_dir: reports/sapelo2_genome72

input:
  manifest: data/sapelo2_manifest.csv
  sequencing_type: paired_end
  remote_data: true                      # FASTQ already on the cluster -> no upload

execution:
  dry_run: false
  mode: hpc
  threads: 8

tools:
  qc: {fastqc: false, fastp: false, multiqc: false}
  host_removal: {tool: minimap2, host_reference: ""}
  viral_detection:
    tools: [gottcha2]
    # GOTTCHA2 appends .mmi/.stats/.tax.tsv to this prefix (real files are
    # gottcha_db.species.fna.{mmi,stats,tax.tsv}).
    gottcha2_db: /scratch/sp96859/Meta-genome-data-analysis/Apptainer/databases/gottcha2_db/gottcha_db.species.fna
    gottcha2_level: species
  assembly: {enabled: false, assembler: megahit}
  novel_virus_screening: {enabled: false, tools: [checkv]}

risk:
  high_risk_pathogens: [SARS-CoV-2, Influenza A virus, Influenza B virus, Norovirus, Enterovirus]
  review_on_high_risk: true
  review_on_novel_candidates: true
  review_on_qc_failure: true

report:
  formats: [markdown, html]

human_review:
  mode: pause                # pause at the review checkpoint; approve via `metamavs review`

llm:
  enabled: true              # Phase 4: AI-assisted interpretation (needs ANTHROPIC_API_KEY in .env)
  model: claude-opus-4-8     # default model for all LLM agents (alt: claude-sonnet-4-6)
  effort: medium             # low / medium / high / xhigh / max
  max_tokens: 4000
  # Optional per-agent overrides. Keys: qc, taxonomy, abundance, novel_virus,
  # risk_assessment, llm_interpretation. Unset fields inherit the defaults above.
  # overrides:
  #   risk_assessment: { model: claude-opus-4-8, effort: high }   # strong model for risk
  #   taxonomy:        { model: claude-opus-4-8 }
  #   qc:              { model: claude-haiku-4-5, effort: low }    # cheap model for QC
  #   abundance:       { model: claude-sonnet-4-6 }

ncbi:
  enabled: true              # ground taxonomy/risk LLM in verified NCBI lineage (local controller needs internet)
  email: pengsihua99@gmail.com   # for NCBI E-utilities etiquette / rate-limit contact
  # api_key: ""              # optional NCBI API key (raises rate limit)
  timeout_s: 15

hpc:
  backend: ssh
  host: sapelo2.gacrc.uga.edu
  user: sp96859
  remote_base: /scratch/sp96859/Meta-genome-data-analysis/Apptainer/Meta_MAVS
  partition: bahl_p
  # GOTTCHA2-only: run a single job. (Add kraken2/host_removal/novel_virus later.)
  steps: [gottcha2]
  # GOTTCHA2's minimap2 index is ~94 GB -> needs a high-memory allocation.
  # NOTE: verify bahl_p nodes provide this much RAM (else use a highmem partition).
  step_resources:
    gottcha2: {mem: "120G", cpus: 16, time: "12:00:00"}
  # Per-step environment: prepend the right conda env's bin to PATH (no conda init).
  step_env:
    gottcha2: ["export PATH=/home/sp96859/.conda/envs/gottcha2_env/bin:$PATH"]
    kraken2:  ["export PATH=/home/sp96859/.conda/envs/kraken2_env/bin:$PATH"]
    host_removal: ["export PATH=/home/sp96859/.conda/envs/gottcha2_env/bin:$PATH"]
    novel_virus: ["export PATH=/home/sp96859/.conda/envs/megahit_env/bin:$PATH"]
  retries: 3
  poll_interval_s: 60
  max_wait_s: 86400
  ssh_control: true
  ssh_control_path: ~/.ssh/mm-sapelo2
  ssh_control_persist: 8h
  ssh_opts: []
